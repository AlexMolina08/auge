<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auge</title>
  <meta name="description" content="Landing page, política de privacidad y términos de servicio de Auge.">
  <style>
    :root { color-scheme: light dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #233876 0, #0f172a 42%, #020617 100%); color: white; }
    main { width: min(680px, calc(100% - 48px)); text-align: center; }
    .badge { display: inline-block; padding: 8px 12px; border: 1px solid rgba(255,255,255,.18); border-radius: 999px; color: #c7d2fe; background: rgba(255,255,255,.06); }
    h1 { font-size: clamp(56px, 12vw, 112px); line-height: .9; margin: 28px 0 18px; letter-spacing: -0.08em; }
    p { color: #cbd5e1; font-size: clamp(18px, 3vw, 24px); line-height: 1.5; margin: 0 auto; }
    nav { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a { color: white; text-decoration: none; padding: 12px 16px; border-radius: 14px; background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.14); }
  </style>
</head>
<body>
  <main>
    <span class="badge">Próximamente</span>
    <h1>Auge</h1>
    <p>Web oficial de Auge: landing page, política de privacidad y términos de servicio.</p>
    <nav aria-label="Enlaces legales">
      <a href="#privacidad">Privacidad</a>
      <a href="#terminos">Términos</a>
    </nav>
  </main>
</body>
</html>
